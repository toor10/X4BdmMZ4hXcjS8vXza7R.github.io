<!DOCTYPE html>
<html>

<head>
  <title>Test Popup</title>
</head>

<body>

<h1>SITO OK</h1>

<!-- POPUP -->
<div id="popup-overlay" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:99999;
justify-content:center;
align-items:center;
">

  <div style="
  background:white;
  width:90%;
  max-width:600px;
  padding:25px;
  border-radius:15px;
  position:relative;
  ">

    <button id="close-popup" style="
    position:absolute;
    top:10px;
    right:15px;
    border:none;
    background:none;
    font-size:30px;
    cursor:pointer;
    ">
      ×
    </button>

    <div id="popup-content"></div>

  </div>

</div>

<script>

fetch('popup.html')

.then(response => {

  if (!response.ok) {
    throw new Error();
  }

  return response.text();

})

.then(html => {

  document.getElementById('popup-content').innerHTML = html;

  document.getElementById('popup-overlay').style.display = 'flex';

})

.catch(error => {

  console.log("popup non trovato");

});

document.getElementById('close-popup').onclick = function() {

  document.getElementById('popup-overlay').style.display = 'none';

};

</script>

</body>
</html>
